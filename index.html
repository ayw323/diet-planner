<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식단 플래너 — 나만의 맞춤 식단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c0c; --bg2: #141414; --surface: #1c1c1c; --surface2: #242424; --surface3: #2c2c2c;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #efefef; --text2: #909090; --text3: #555;
    --accent: #d4f050; --accent2: #b8d43a; --accent-dim: rgba(212,240,80,0.1);
    --red: #ff6b6b; --blue: #6fa8ff; --orange: #ffb347; --teal: #4ecdc4;
    --r: 12px; --r-sm: 8px; --r-lg: 18px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  .container { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }

  /* HERO */
  .hero { padding: 60px 0 48px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
  .hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .hero h1 { font-family: 'Noto Serif KR', serif; font-size: clamp(32px, 5vw, 48px); font-weight: 700; line-height: 1.2; letter-spacing: -1px; margin-bottom: 14px; }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero p { font-size: 15px; color: var(--text2); max-width: 480px; line-height: 1.7; }

  /* CARDS */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 28px; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
  .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }

  /* FORM */
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col-span-2 { grid-column: span 2; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field label { font-size: 12px; font-weight: 500; color: var(--text2); }
  .field input, .field select, .field textarea { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 11px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s, background 0.2s; appearance: none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); background: var(--surface3); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }
  .field textarea { resize: none; height: 72px; line-height: 1.6; }
  .apikey-wrapper { position: relative; }
  .apikey-wrapper input { width: 100%; padding-right: 44px; font-family: monospace; font-size: 13px; }
  .apikey-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
  .apikey-toggle:hover { color: var(--text2); }
  .apikey-hint { font-size: 11px; color: var(--text3); margin-top: 5px; }
  .apikey-hint a { color: var(--accent); text-decoration: none; }

  /* BUTTON */
  .btn-generate { width: 100%; padding: 16px; background: var(--accent); color: #0c0c0c; border: none; border-radius: var(--r-sm); font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 6px; transition: background 0.2s, transform 0.1s, opacity 0.2s; letter-spacing: -0.2px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-generate:hover:not(:disabled) { background: var(--accent2); }
  .btn-generate:active:not(:disabled) { transform: scale(0.99); }
  .btn-generate:disabled { opacity: 0.35; cursor: not-allowed; }

  /* LOADING */
  .loading-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 52px 24px; text-align: center; display: none; margin-bottom: 14px; }
  .loading-card.visible { display: block; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .loading-sub { font-size: 13px; color: var(--text2); }
  .loading-steps { margin-top: 20px; display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .loading-step { font-size: 12px; color: var(--text3); transition: color 0.3s; }
  .loading-step.active { color: var(--accent); }

  /* ERROR */
  .error-card { background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.25); border-radius: var(--r-sm); padding: 14px 18px; font-size: 13px; color: var(--red); display: none; margin-bottom: 14px; line-height: 1.6; }
  .error-card.visible { display: block; }

  /* RESULT */
  .result-section { display: none; }
  .result-section.visible { display: block; }

  /* TARGETS */
  .targets-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .target-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 18px 14px; text-align: center; }
  .target-card .t-val { font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: -1px; line-height: 1; }
  .target-card .t-unit { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .target-card .t-lbl { font-size: 11px; color: var(--text3); margin-top: 8px; }

  /* DAY TABS */
  .day-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .day-tab { padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); transition: all 0.15s; font-family: inherit; }
  .day-tab:hover { border-color: var(--accent); color: var(--accent); }
  .day-tab.active { background: var(--accent); color: #0c0c0c; border-color: var(--accent); font-weight: 700; }

  /* DAY SUMMARY */
  .day-summary { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 20px; display: flex; gap: 28px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
  .summary-item .s-lbl { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
  .summary-item .s-val { font-size: 16px; font-weight: 700; color: var(--accent); }

  /* MEAL CARDS */
  .meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
  .meal-card:hover { border-color: var(--border2); }
  .meal-card.open { border-color: rgba(212,240,80,0.2); }
  .meal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; user-select: none; }
  .meal-left { display: flex; align-items: center; gap: 12px; }
  .meal-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; letter-spacing: 0.2px; white-space: nowrap; }
  .badge-breakfast { background: rgba(255,179,71,0.12); color: var(--orange); }
  .badge-lunch { background: rgba(111,168,255,0.12); color: var(--blue); }
  .badge-dinner { background: rgba(212,240,80,0.1); color: var(--accent); }
  .badge-snack { background: rgba(255,107,107,0.12); color: var(--red); }
  .meal-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .meal-right { display: flex; align-items: center; gap: 14px; }
  .meal-kcal { font-size: 13px; color: var(--text2); font-weight: 500; }
  .meal-arrow { font-size: 11px; color: var(--text3); transition: transform 0.25s; }
  .meal-card.open .meal-arrow { transform: rotate(180deg); }
  .meal-body { display: none; padding: 20px; border-top: 1px solid var(--border); animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .meal-card.open .meal-body { display: block; }
  .meal-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; margin-top: 20px; }
  .meal-section-title:first-child { margin-top: 0; }
  .ingredients-list { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 4px; }
  .ingredient-tag { background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; padding: 4px 11px; font-size: 12px; color: var(--text2); }
  .recipe-text { font-size: 14px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }

  /* NUTRITION TABLE */
  .nutrition-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .nutrition-table thead tr { background: var(--surface2); }
  .nutrition-table th { padding: 9px 12px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); }
  .nutrition-table th:last-child { text-align: right; }
  .nutrition-table td { padding: 9px 12px; font-size: 13px; color: var(--text); border-bottom: 1px solid var(--border); }
  .nutrition-table td:last-child { text-align: right; font-weight: 600; color: var(--accent); }
  .nutrition-table tr:last-child td { border-bottom: none; }
  .nutrition-table .sub td { padding-left: 26px; font-size: 12px; color: var(--text2); }
  .nutrition-table .sub td:last-child { color: var(--text2); font-weight: 400; }

  /* WEEKLY TABLE */
  .weekly-table-wrap { overflow-x: auto; margin-top: 4px; }
  .weekly-table { width: 100%; border-collapse: collapse; min-width: 680px; }
  .weekly-table th { padding: 10px 8px; font-size: 11px; font-weight: 600; text-align: center; color: var(--text2); background: var(--surface2); border-bottom: 1px solid var(--border2); }
  .weekly-table th:first-child { text-align: left; padding-left: 14px; }
  .weekly-table td { padding: 11px 8px; font-size: 12px; text-align: center; color: var(--text); border-bottom: 1px solid var(--border); vertical-align: middle; line-height: 1.4; }
  .weekly-table td:first-child { text-align: left; padding-left: 14px; font-weight: 600; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .weekly-table tr.divider td { background: var(--surface2); color: var(--accent); font-size: 11px; font-weight: 700; padding: 8px; }
  .weekly-table tr:last-child td { border-bottom: none; }

  /* DAY CONTENT */
  .day-content { display: none; }
  .day-content.active { display: block; }

  /* FOOTER */
  .result-footer { margin-top: 20px; padding: 16px 20px; background: var(--accent-dim); border: 1px solid rgba(212,240,80,0.15); border-radius: var(--r-sm); font-size: 13px; color: var(--text2); line-height: 1.7; }
  .result-footer strong { color: var(--accent); }

  @media (max-width: 600px) {
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .targets-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <div class="hero-eyebrow">AI 맞춤 식단 플래너</div>
    <h1>내 몸에 맞는<br><em>일주일 식단</em></h1>
    <p>신체 정보와 목표를 입력하면 21끼니 맞춤 식단과 영양성분표를 자동으로 만들어드려요.</p>
  </div>

  <div class="card">
    <div class="card-title">API 키 설정</div>
    <div class="field">
      <label>Anthropic API Key</label>
      <div class="apikey-wrapper">
        <input type="password" id="apiKey" placeholder="sk-ant-api03-...">
        <button class="apikey-toggle" onclick="toggleApiKey()">👁</button>
      </div>
      <div class="apikey-hint">키가 없다면 <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>에서 발급하세요. 키는 이 기기에만 사용됩니다.</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">신체 정보</div>
    <div class="grid-3">
      <div class="field"><label>키 (cm)</label><input type="number" id="height" placeholder=""></div>
      <div class="field"><label>체중 (kg)</label><input type="number" id="weight" placeholder="" step="0.1"></div>
      <div class="field"><label>나이</label><input type="number" id="age" placeholder=""></div>
      <div class="field"><label>성별</label><select id="gender"><option value="여성">여성</option><option value="남성">남성</option></select></div>
      <div class="field"><label>활동량</label><select id="activity"><option value="낮음">낮음 (거의 운동 안 함)</option><option value="중간" selected>중간 (주 3~4회)</option><option value="높음">높음 (매일 운동)</option></select></div>
      <div class="field"><label>목표</label><select id="goal"><option value="체지방 감량 + 근육 유지">체지방 감량 + 근육 유지</option><option value="근육 증량">근육 증량</option><option value="체중 유지">체중 유지</option><option value="체지방 감량">체지방 감량</option></select></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">식단 선호도</div>
    <div class="grid-2">
      <div class="field"><label>좋아하는 음식</label><input type="text" id="likes" placeholder="파스타, 덮밥, 국물요리, 타코..."></div>
      <div class="field"><label>못 먹거나 싫어하는 재료</label><input type="text" id="dislikes" placeholder="고수, 굴, 내장, 고구마..."></div>
      <div class="field col-span-2"><label>기타 조건</label><textarea id="notes" placeholder="예: 저녁에는 탄수화물 안 먹음 / 주 2회 외식 가능 / 아침은 간단하게 / 식재료 낭비 없게..."></textarea></div>
    </div>
    <button class="btn-generate" id="generateBtn" onclick="generate()">일주일 식단 생성하기</button>
  </div>

  <div class="loading-card" id="loadingCard">
    <div class="spinner"></div>
    <div class="loading-title">식단을 구성하고 있어요</div>
    <div class="loading-sub">약 30~60초 소요됩니다</div>
    <div class="loading-steps">
      <div class="loading-step" id="step1">① 신체 정보 분석 및 칼로리 목표 계산</div>
      <div class="loading-step" id="step2">② 21끼니 레시피 구성 중</div>
      <div class="loading-step" id="step3">③ 영양성분표 전 항목 계산 중</div>
      <div class="loading-step" id="step4">④ 식단표 최종 정리 중</div>
    </div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <div class="result-section" id="resultSection">
    <div class="section-label">하루 목표 섭취량</div>
    <div class="targets-grid" id="targetsGrid"></div>
    <div class="section-label" style="margin-top:28px">요일별 식단</div>
    <div class="day-tabs" id="dayTabs"></div>
    <div id="dayContents"></div>
    <div class="card" style="margin-top:28px">
      <div class="card-title">주간 식단표 요약</div>
      <div class="weekly-table-wrap"><table class="weekly-table" id="weeklyTable"></table></div>
    </div>
    <div class="result-footer" id="resultFooter"></div>
  </div>

</div>
<script>
function toggleApiKey() {
  const i = document.getElementById('apiKey');
  i.type = i.type === 'password' ? 'text' : 'password';
}

function calcTargets(h, w, age, gender, activity, goal) {
  const bmr = gender === '여성' ? (10*w + 6.25*h - 5*age - 161) : (10*w + 6.25*h - 5*age + 5);
  const mult = {'낮음':1.375,'중간':1.55,'높음':1.725};
  let tdee = bmr * (mult[activity]||1.55);
  if (goal.includes('감량')) tdee -= 350;
  if (goal.includes('증량')) tdee += 300;
  const kcal = Math.round(tdee);
  const protein = Math.round(w * 2.0);
  const fat = Math.round((kcal * 0.27) / 9);
  const carb = Math.round((kcal - protein*4 - fat*9) / 4);
  return { kcal, protein, fat, carb };
}

let stepInterval = null;
function startLoadingSteps() {
  const steps = ['step1','step2','step3','step4'];
  let i = 0;
  steps.forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(steps[0]).classList.add('active');
  stepInterval = setInterval(() => {
    steps.forEach(s => document.getElementById(s).classList.remove('active'));
    i = (i+1) % steps.length;
    document.getElementById(steps[i]).classList.add('active');
  }, 5000);
}
function stopLoadingSteps() { if (stepInterval) { clearInterval(stepInterval); stepInterval = null; } }

async function generate() {
  const apiKey = document.getElementById('apiKey').value.trim();
  const h = parseFloat(document.getElementById('height').value);
  const w = parseFloat(document.getElementById('weight').value);
  const age = parseInt(document.getElementById('age').value);
  const gender = document.getElementById('gender').value;
  const activity = document.getElementById('activity').value;
  const goal = document.getElementById('goal').value;
  const likes = document.getElementById('likes').value.trim();
  const dislikes = document.getElementById('dislikes').value.trim();
  const notes = document.getElementById('notes').value.trim();

  if (!apiKey) return showError('API 키를 입력해주세요.');
  if (!h || !w || !age) return showError('키, 체중, 나이를 모두 입력해주세요.');

  const targets = calcTargets(h, w, age, gender, activity, goal);

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('errorCard').classList.remove('visible');
  document.getElementById('loadingCard').classList.add('visible');
  startLoadingSteps();

  const prompt = `당신은 전문 영양사이자 셰프입니다. 아래 정보를 바탕으로 일주일치(월~일) 맞춤 식단을 생성하세요.

[신체 정보]
성별: ${gender}, 나이: ${age}세, 키: ${h}cm, 체중: ${w}kg, 활동량: ${activity}
목표: ${goal}
하루 목표: 칼로리 ${targets.kcal}kcal, 단백질 ${targets.protein}g, 지방 ${targets.fat}g, 탄수화물 ${targets.carb}g

[식단 조건]
좋아하는 음식: ${likes||'제한 없음'}
기피 재료: ${dislikes||'없음'}
기타 조건: ${notes||'없음'}

[중요 지침]
1. 하루 총 칼로리가 반드시 ${targets.kcal}kcal(±50)에 맞아야 합니다
2. 단백질은 반드시 ${targets.protein}g 이상 충족해야 합니다
3. 다이어트 식단이 아니라 실제로 먹고 싶은 다채로운 음식으로 구성 (한식, 일식, 양식, 중식, 태국, 멕시칸, 지중해식 등)
4. 식재료 낭비 최소화: 같은 주 내에서 재료를 겹쳐 사용
5. 각 끼니마다 영양성분표 전 항목을 실제 수치로 입력
6. 기타 조건을 반드시 지켜주세요

반드시 아래 JSON만 출력하고 다른 텍스트는 절대 없이:
{"days":[{"day":"월요일","meals":[{"type":"아침","name":"음식명","is_eating_out":false,"eating_out_tip":"","ingredients":["닭가슴살 180g"],"recipe":"조리법 2~3문장","nutrition":{"calories":520,"carbohydrate":58,"sugar":5,"dietary_fiber":6,"protein":42,"fat":14,"saturated_fat":3,"trans_fat":0,"cholesterol":95,"sodium":480,"calcium":65,"iron":3}}]}],"shopping_list":{"protein":["닭가슴살 600g"],"vegetables":["시금치 300g"],"carbs":["현미밥 5개"],"etc":["올리브오일"]},"weekly_notes":"한줄설명"}

7일 × (아침+점심+저녁) = 21끼니 모두 포함.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API 오류 (${res.status})`);
    }

    const data = await res.json();
    const raw = data.content?.[0]?.text || '';
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('응답 파싱 실패. 다시 시도해주세요.');
    const plan = JSON.parse(match[0]);
    stopLoadingSteps();
    document.getElementById('loadingCard').classList.remove('visible');
    renderResult(plan, targets);
  } catch(e) {
    stopLoadingSteps();
    document.getElementById('loadingCard').classList.remove('visible');
    showError('오류: ' + e.message);
    document.getElementById('generateBtn').disabled = false;
  }
}

function renderResult(plan, targets) {
  document.getElementById('targetsGrid').innerHTML = [
    [targets.kcal,'kcal','일일 칼로리 목표'],
    [targets.protein+'g','','근육 유지·증량'],
    [targets.carb+'g','','에너지원'],
    [targets.fat+'g','','호르몬·지용성 비타민'],
  ].map(([v,u,l]) => `<div class="target-card"><div class="t-val">${v}</div>${u?`<div class="t-unit">${u}</div>`:''}<div class="t-lbl">${l}</div></div>`).join('');

  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  plan.days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i===0?' active':'');
    btn.textContent = day.day;
    btn.onclick = () => switchDay(i);
    tabs.appendChild(btn);
  });

  const dc = document.getElementById('dayContents');
  dc.innerHTML = '';
  plan.days.forEach((day, di) => {
    const wrap = document.createElement('div');
    wrap.className = 'day-content' + (di===0?' active':'');
    wrap.id = 'day-'+di;
    const totKcal = day.meals.reduce((s,m)=>s+(m.nutrition?.calories||0),0);
    const totP = day.meals.reduce((s,m)=>s+(m.nutrition?.protein||0),0);
    const totC = day.meals.reduce((s,m)=>s+(m.nutrition?.carbohydrate||0),0);
    const totF = day.meals.reduce((s,m)=>s+(m.nutrition?.fat||0),0);
    wrap.innerHTML = `
      <div class="day-summary">
        <div class="summary-item"><div class="s-lbl">총 칼로리</div><div class="s-val">${totKcal} kcal</div></div>
        <div class="summary-item"><div class="s-lbl">단백질</div><div class="s-val">${totP}g</div></div>
        <div class="summary-item"><div class="s-lbl">탄수화물</div><div class="s-val">${totC}g</div></div>
        <div class="summary-item"><div class="s-lbl">지방</div><div class="s-val">${totF}g</div></div>
      </div>
      ${day.meals.map((m,mi)=>renderMealCard(m,di,mi)).join('')}
    `;
    dc.appendChild(wrap);
  });

  renderWeeklyTable(plan);

  document.getElementById('resultFooter').innerHTML = `
    <strong>⚠️ 영양성분 안내:</strong> 현재 표시된 수치는 AI 추정값으로, 실제 식품의 수치와 다를 수 있습니다. 정확한 수치는 식품의약품안전처 DB 연동 후 업데이트 예정입니다.
    ${plan.weekly_notes ? '<br><br><strong>이번 주 식단:</strong> ' + plan.weekly_notes : ''}
  `;

  document.getElementById('resultSection').classList.add('visible');
  document.getElementById('generateBtn').disabled = false;
  document.getElementById('resultSection').scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderMealCard(meal, di, mi) {
  const id = `meal-${di}-${mi}`;
  const badgeMap = {'아침':'badge-breakfast','점심':'badge-lunch','저녁':'badge-dinner','간식':'badge-snack'};
  const n = meal.nutrition || {};
  const ings = (meal.ingredients||[]).map(i=>`<span class="ingredient-tag">${i}</span>`).join('');
  const nutRows = [
    ['열량',n.calories,'kcal',false],['탄수화물',n.carbohydrate,'g',false],
    ['당류',n.sugar,'g',true],['식이섬유',n.dietary_fiber,'g',true],
    ['단백질',n.protein,'g',false],['지방',n.fat,'g',false],
    ['포화지방',n.saturated_fat,'g',true],['트랜스지방',n.trans_fat,'g',true],
    ['콜레스테롤',n.cholesterol,'mg',false],['나트륨',n.sodium,'mg',false],
    ['칼슘',n.calcium,'mg',false],['철분',n.iron,'mg',false],
  ].map(([name,val,unit,sub])=>`<tr class="${sub?'sub':''}"><td>${name}</td><td>${val!=null?val+unit:'-'}</td></tr>`).join('');
  const eatOut = meal.is_eating_out ? `<span style="font-size:11px;background:rgba(78,205,196,0.12);color:var(--teal);padding:3px 9px;border-radius:100px;font-weight:600;margin-left:6px;">🍽 외식</span>` : '';
  return `
    <div class="meal-card" id="${id}">
      <div class="meal-header" onclick="toggleMeal('${id}')">
        <div class="meal-left">
          <span class="meal-badge ${badgeMap[meal.type]||'badge-snack'}">${meal.type}</span>
          <span class="meal-name">${meal.name}</span>${eatOut}
        </div>
        <div class="meal-right">
          <span class="meal-kcal">${n.calories??0} kcal</span>
          <span class="meal-arrow">▼</span>
        </div>
      </div>
      <div class="meal-body">
        <div class="meal-section-title">재료</div>
        <div class="ingredients-list">${ings}</div>
        ${meal.is_eating_out && meal.eating_out_tip ? `<div style="margin-top:10px;padding:10px 14px;background:rgba(78,205,196,0.08);border-radius:var(--r-sm);font-size:13px;color:var(--teal);">💡 ${meal.eating_out_tip}</div>` : ''}
        <div class="meal-section-title" style="margin-top:18px">조리법</div>
        <div class="recipe-text">${meal.recipe||''}</div>
        <div class="meal-section-title" style="margin-top:18px">영양성분표</div>
        <table class="nutrition-table">
          <thead><tr><th>영양소</th><th>함량</th></tr></thead>
          <tbody>${nutRows}</tbody>
        </table>
      </div>
    </div>`;
}

function renderWeeklyTable(plan) {
  const days = plan.days;
  let html = '<thead><tr><th></th>';
  days.forEach(d => { html += `<th>${d.day}</th>`; });
  html += '</tr></thead><tbody>';
  ['아침','점심','저녁'].forEach(type => {
    html += `<tr><td>${type}</td>`;
    days.forEach(day => {
      const m = day.meals.find(m=>m.type===type);
      html += `<td style="font-size:12px">${m?m.name:'-'}</td>`;
    });
    html += '</tr>';
  });
  [['칼로리','calories',''],['탄수화물','carbohydrate','g'],['단백질','protein','g'],['지방','fat','g']].forEach(([lbl,key,unit]) => {
    html += `<tr class="divider"><td>${lbl}</td>`;
    days.forEach(day => {
      const tot = day.meals.reduce((s,m)=>s+(m.nutrition?.[key]||0),0);
      html += `<td>${tot}${unit}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody>';
  document.getElementById('weeklyTable').innerHTML = html;
}

function toggleMeal(id) { document.getElementById(id).classList.toggle('open'); }
function switchDay(i) {
  document.querySelectorAll('.day-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.querySelectorAll('.day-content').forEach((c,idx)=>c.classList.toggle('active',idx===i));
}
function showError(msg) {
  const el = document.getElementById('errorCard');
  el.textContent = msg;
  el.classList.add('visible');
  document.getElementById('generateBtn').disabled = false;
}
</script>
</body>
</html>
